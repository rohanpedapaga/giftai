<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Saved Messages Dashboard</h1>
<div class="dashboard-metrics grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4" style="margin-bottom: 2rem;">
  <div class="metric-card glass-card p-4">
    <h3 class="text-sm font-medium text-gray-400">Total Messages</h3>
    <p id="totalMessages" class="value">0</p>
    <div class="trend"><span class="icon">▲</span><span class="text">+5%</span></div>
  </div>
  <div class="metric-card glass-card p-4">
    <h3 class="text-sm font-medium text-gray-400">Unique Recipients</h3>
    <p id="uniqueRecipients" class="value">0</p>
    <div class="trend"><span class="icon">▲</span><span class="text">+12%</span></div>
  </div>
  <div class="metric-card glass-card p-4">
    <h3 class="text-sm font-medium text-gray-400">Last Message Date</h3>
    <p id="lastMessageDate" class="value">N/A</p>
    <div class="trend"><span class="icon">—</span><span class="text">-</span></div>
  </div>
  <div class="metric-card glass-card p-4">
    <h3 class="text-sm font-medium text-gray-400">Avg. Length</h3>
    <p id="avgLength" class="value">0</p>
    <div class="trend"><span class="icon">▲</span><span class="text">+2%</span></div>
  </div>
</div>

<table class="glass-table" style="width:100%; border-collapse:collapse;">
  <thead class="glass-header">
    <tr>
      <th>Occasion</th>
      <th>Recipient</th>
      <th>Relationship</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<br>

<a href="index.html">
    <button>Back to Generator</button>
</a>
<button onclick="clearRecords()">
    Clear All Records
</button>

</div>
<script>

const messages =
JSON.parse(localStorage.getItem("messages")) || [];

document.getElementById("totalMessages").innerText =
`Total Messages: ${messages.length}`;

const tableBody =
document.getElementById("tableBody");

function clearRecords(){

    if(confirm("Are you sure you want to delete all records?")){
        localStorage.removeItem("messages");
        location.reload();
    }

}

messages.forEach(msg => {

    tableBody.innerHTML += `
        <tr>
            <td>${msg.occasion}</td>
            <td>${msg.name}</td>
            <td>${msg.relationship}</td>
            <td>${msg.date}</td>
        </tr>
    `;
});

</script>
</body>
</html>
